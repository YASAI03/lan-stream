<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lan-stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .app-header { width:100%; padding:0 20px; height:44px; background:#16213e; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2d4059; }
        .header-left { display:flex; align-items:center; gap:24px; }
        .logo { font-size:16px; font-weight:700; color:#e0e0e0; }
        .app-header nav { display:flex; gap:4px; }
        .app-header nav a { color:#8892b0; text-decoration:none; padding:4px 12px; border-radius:4px; font-size:13px; }
        .app-header nav a:hover { color:#e0e0e0; background:#2d4059; }
        .app-header nav a.active { color:#4a9eff; background:rgba(74,158,255,0.1); }
        .header-right { display:flex; align-items:center; gap:6px; }
        .health-dot { width:8px; height:8px; border-radius:50%; background:#666; }
        .health-dot.capturing { background:#3fb950; }
        .health-dot.streaming { background:#3fb950; animation:pulse 2s infinite; }
        .health-dot.warning { background:#d29922; }
        .health-dot.stopped { background:#f85149; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        #health-text { font-size:12px; color:#8b949e; }
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            width: 100%;
            position: relative;
        }
        #stream-status {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #2d4059;
            z-index: 10;
        }
        #stream-status.connected { background: #1b5e20; }
        #stream-status.error { background: #b71c1c; }
        #stream {
            max-width: 100%;
            max-height: calc(100vh - 60px);
            border-radius: 4px;
            background: repeating-conic-gradient(#808080 0% 25%, #c0c0c0 0% 50%) 0 0 / 20px 20px;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <span class="logo">lan-stream</span>
            <nav>
                <a href="/" class="active">ストリーム</a>
                <a href="/config">設定</a>
                <a href="/debug">デバッグ</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="ping-text" style="font-size:12px;color:#8b949e;margin-right:12px">server: -- | decode: --</span>
            <span class="health-dot" id="health-dot"></span>
            <span id="health-text">確認中...</span>
        </div>
    </header>
    <div class="container">
        <span id="stream-status">接続中...</span>
        <canvas id="stream"></canvas>
    </div>
    <script>
        // Minimal QOI decoder
        function decodeQOI(buf) {
            const view = new DataView(buf);
            if (view.getUint32(0) !== 0x716F6966) return null;
            const w = view.getUint32(4);
            const h = view.getUint32(8);
            const pixels = new Uint8ClampedArray(w * h * 4);
            const index = new Uint8Array(64 * 4);
            let r = 0, g = 0, b = 0, a = 255;
            let pos = 14, pxPos = 0, end = buf.byteLength - 8;
            const data = new Uint8Array(buf);
            while (pos < end && pxPos < pixels.length) {
                const b1 = data[pos++];
                if (b1 === 0xFE) {
                    r = data[pos++]; g = data[pos++]; b = data[pos++];
                } else if (b1 === 0xFF) {
                    r = data[pos++]; g = data[pos++]; b = data[pos++]; a = data[pos++];
                } else {
                    const op = b1 & 0xC0;
                    if (op === 0x00) {
                        const idx = (b1 & 0x3F) * 4;
                        r = index[idx]; g = index[idx+1]; b = index[idx+2]; a = index[idx+3];
                    } else if (op === 0x40) {
                        r = (r + ((b1 >> 4) & 3) - 2) & 255;
                        g = (g + ((b1 >> 2) & 3) - 2) & 255;
                        b = (b + (b1 & 3) - 2) & 255;
                    } else if (op === 0x80) {
                        const b2 = data[pos++];
                        const dg = (b1 & 0x3F) - 32;
                        r = (r + dg - 8 + ((b2 >> 4) & 0x0F)) & 255;
                        g = (g + dg) & 255;
                        b = (b + dg - 8 + (b2 & 0x0F)) & 255;
                    } else {
                        let run = (b1 & 0x3F) + 1;
                        while (run-- > 0 && pxPos < pixels.length) {
                            pixels[pxPos++] = r; pixels[pxPos++] = g;
                            pixels[pxPos++] = b; pixels[pxPos++] = a;
                        }
                        const idx2 = ((r * 3 + g * 5 + b * 7 + a * 11) & 63) * 4;
                        index[idx2] = r; index[idx2+1] = g; index[idx2+2] = b; index[idx2+3] = a;
                        continue;
                    }
                }
                const idx = ((r * 3 + g * 5 + b * 7 + a * 11) & 63) * 4;
                index[idx] = r; index[idx+1] = g; index[idx+2] = b; index[idx+3] = a;
                pixels[pxPos++] = r; pixels[pxPos++] = g;
                pixels[pxPos++] = b; pixels[pxPos++] = a;
            }
            return { width: w, height: h, data: pixels };
        }

        const canvas = document.getElementById('stream');
        const ctx = canvas.getContext('2d');
        const streamStatus = document.getElementById('stream-status');

        let lastDecodeMs = 0;

        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${proto}//${location.host}/ws`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                streamStatus.textContent = '配信中';
                streamStatus.className = 'connected';
            };

            ws.onmessage = (e) => {
                const t0 = performance.now();
                const img = decodeQOI(e.data);
                if (!img) return;
                if (canvas.width !== img.width || canvas.height !== img.height) {
                    canvas.width = img.width;
                    canvas.height = img.height;
                }
                const imageData = new ImageData(img.data, img.width, img.height);
                ctx.putImageData(imageData, 0, 0);
                lastDecodeMs = performance.now() - t0;
            };

            ws.onclose = () => {
                streamStatus.textContent = '切断';
                streamStatus.className = 'error';
                setTimeout(() => {
                    streamStatus.textContent = '再接続中...';
                    streamStatus.className = '';
                    connect();
                }, 3000);
            };

            ws.onerror = () => { ws.close(); };
        }

        connect();

        (function(){
            async function pollHealth(){
                try{
                    const r=await fetch('/api/health');
                    const h=await r.json();
                    const dot=document.getElementById('health-dot');
                    const txt=document.getElementById('health-text');
                    if(h.capturing){
                        const fpsBelowTarget=h.fps && h.target_fps && h.fps < h.target_fps * 0.9;
                        if(h.client_connected){
                            dot.className='health-dot '+(fpsBelowTarget?'warning':'streaming');
                            txt.textContent='配信中'+(h.fps?' ('+h.fps.toFixed(1)+'/'+h.target_fps+' fps)':'');
                        }else{
                            dot.className='health-dot '+(fpsBelowTarget?'warning':'capturing');
                            txt.textContent='キャプチャ中'+(h.fps?' ('+h.fps.toFixed(1)+'/'+h.target_fps+' fps)':'');
                        }
                    }else{
                        dot.className='health-dot stopped';
                        txt.textContent='停止中';
                    }
                }catch(e){
                    document.getElementById('health-dot').className='health-dot stopped';
                    document.getElementById('health-text').textContent='接続エラー';
                }
            }
            setInterval(pollHealth,3000);
            pollHealth();
            window.addEventListener('online',()=>location.reload());
        })();
        (function(){
            async function measurePing(){
                try{
                    const t0=performance.now();
                    await fetch('/api/ping');
                    const rtt=Math.round(performance.now()-t0);
                    const dec=lastDecodeMs.toFixed(1);
                    document.getElementById('ping-text').textContent='server: '+rtt+'ms | decode: '+dec+'ms';
                }catch(e){
                    document.getElementById('ping-text').textContent='server: -- | decode: --';
                }
            }
            setInterval(measurePing,3000);
            measurePing();
        })();
    </script>
</body>
</html>
