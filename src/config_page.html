<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lan-stream - 設定</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
        }
        .app-header { width:100%; padding:0 20px; height:44px; background:#16213e; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2d4059; }
        .header-left { display:flex; align-items:center; gap:24px; }
        .logo { font-size:16px; font-weight:700; color:#e0e0e0; }
        .app-header nav { display:flex; gap:4px; }
        .app-header nav a { color:#8892b0; text-decoration:none; padding:4px 12px; border-radius:4px; font-size:13px; }
        .app-header nav a:hover { color:#e0e0e0; background:#2d4059; }
        .app-header nav a.active { color:#4a9eff; background:rgba(74,158,255,0.1); }
        .header-right { display:flex; align-items:center; gap:6px; }
        .health-dot { width:8px; height:8px; border-radius:50%; background:#666; }
        .health-dot.capturing { background:#3fb950; }
        .health-dot.streaming { background:#3fb950; animation:pulse 2s infinite; }
        .health-dot.warning { background:#d29922; }
        .health-dot.stopped { background:#f85149; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        #health-text { font-size:12px; color:#8b949e; }
        .page-body {
            padding: 24px;
            max-width: 640px;
            margin: 0 auto;
        }
        h1 { font-size: 20px; margin-bottom: 20px; }
        h2 { font-size: 15px; color: #8892b0; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #8892b0;
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #2d4059;
            border-radius: 4px;
            background: #0f0f23;
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 12px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4a9eff;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row > div { flex: 1; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4a9eff;
            color: #fff;
        }
        .btn-primary:hover { background: #3a8eef; }
        .btn-secondary {
            background: #2d4059;
            color: #e0e0e0;
        }
        .btn-secondary:hover { background: #3d5069; }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }
        #toast.success { background: #1b5e20; color: #fff; }
        #toast.error { background: #b71c1c; color: #fff; }
        nav a:hover { text-decoration: underline; }
        #window-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .window-item {
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .window-item:hover { background: #2d4059; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <span class="logo">lan-stream</span>
            <nav>
                <a href="/">ストリーム</a>
                <a href="/config" class="active">設定</a>
                <a href="/debug">デバッグ</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="ping-text" style="font-size:12px;color:#8b949e;margin-right:12px"></span>
            <span class="health-dot" id="health-dot"></span>
            <span id="health-text">確認中...</span>
        </div>
    </header>
    <div class="page-body">
    <h1>設定</h1>

    <h2>キャプチャ</h2>
    <div class="card">
        <label for="window_title">ウィンドウタイトル（部分一致）</label>
        <input type="text" id="window_title" placeholder="例: メモ帳">
        <button class="btn-secondary" onclick="showWindows()" style="margin-bottom:12px">ウィンドウ一覧から選択</button>
        <div id="window-list" style="display:none"></div>
        <label for="target_fps">ターゲットFPS (1-120)</label>
        <input type="number" id="target_fps" min="1" max="120">
        <label for="keyframe_interval">キーフレーム間隔（フレーム数, 1-600）</label>
        <input type="number" id="keyframe_interval" min="1" max="600">
        <div style="font-size:12px;color:#666;margin-top:-8px;margin-bottom:12px">30fps で 60 = 約2秒ごとにキーフレーム。小さいほど新規接続が早く映るが帯域は増える</div>
        <div style="margin-top:4px">
            <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer">
                <input type="checkbox" id="capture_cursor" style="width:auto;margin:0">
                マウスカーソルを含める
            </label>
        </div>
    </div>

    <h2>サーバー</h2>
    <div class="card">
        <div class="row">
            <div>
                <label for="host">ホスト</label>
                <input type="text" id="host">
            </div>
            <div>
                <label for="port">ポート</label>
                <input type="number" id="port" min="1" max="65535">
            </div>
        </div>
        <p style="font-size:12px;color:#666">※ サーバー設定の変更は再起動後に反映されます</p>
    </div>

    <div class="actions">
        <button class="btn-primary" onclick="saveConfig()">保存</button>
        <button class="btn-secondary" onclick="loadConfig()">リセット</button>
    </div>
    </div>

    <div id="toast"></div>

    <script>
        async function loadConfig() {
            const res = await fetch('/api/config');
            const cfg = await res.json();
            document.getElementById('window_title').value = cfg.capture.window_title;
            document.getElementById('target_fps').value = cfg.capture.target_fps;
            document.getElementById('keyframe_interval').value = cfg.capture.keyframe_interval;
            document.getElementById('capture_cursor').checked = cfg.capture.capture_cursor;
            document.getElementById('host').value = cfg.server.host;
            document.getElementById('port').value = cfg.server.port;
        }

        async function saveConfig() {
            const cfg = {
                capture: {
                    window_title: document.getElementById('window_title').value,
                    target_fps: parseInt(document.getElementById('target_fps').value, 10),
                    capture_cursor: document.getElementById('capture_cursor').checked,
                    keyframe_interval: parseInt(document.getElementById('keyframe_interval').value, 10),
                },
                server: {
                    host: document.getElementById('host').value,
                    port: parseInt(document.getElementById('port').value, 10),
                }
            };
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cfg),
                });
                if (res.ok) {
                    toast('保存しました', 'success');
                } else {
                    const data = await res.json();
                    toast(data.error || '保存に失敗しました', 'error');
                }
            } catch (e) {
                toast('通信エラー', 'error');
            }
        }

        async function showWindows() {
            const list = document.getElementById('window-list');
            list.style.display = 'block';
            list.innerHTML = '読み込み中...';
            try {
                const res = await fetch('/api/windows');
                const windows = await res.json();
                list.innerHTML = windows.map(w =>
                    `<div class="window-item" onclick="selectWindow(this)" data-title="${w.title.replace(/"/g, '&quot;')}">${w.title}</div>`
                ).join('');
            } catch {
                list.innerHTML = '<div style="color:#b71c1c">取得失敗</div>';
            }
        }

        function selectWindow(el) {
            document.getElementById('window_title').value = el.dataset.title;
            document.getElementById('window-list').style.display = 'none';
        }

        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show ' + type;
            setTimeout(() => { el.className = ''; }, 2500);
        }

        loadConfig();

        (function(){
            async function pollHealth(){
                try{
                    const r=await fetch('/api/health');
                    const h=await r.json();
                    const dot=document.getElementById('health-dot');
                    const txt=document.getElementById('health-text');
                    if(h.capturing){
                        const fpsBelowTarget=h.fps && h.target_fps && h.fps < h.target_fps * 0.9 && !h.idle;
                        const fpsText=h.fps?' ('+h.fps.toFixed(1)+'/'+h.target_fps+' fps'+(h.idle?' 静止':'')+')'  :'';
                        if(h.client_connected){
                            dot.className='health-dot '+(fpsBelowTarget?'warning':'streaming');
                            txt.textContent='配信中'+fpsText;
                        }else{
                            dot.className='health-dot '+(fpsBelowTarget?'warning':'capturing');
                            txt.textContent='キャプチャ中'+fpsText;
                        }
                    }else{
                        dot.className='health-dot stopped';
                        txt.textContent='停止中';
                    }
                }catch(e){
                    document.getElementById('health-dot').className='health-dot stopped';
                    document.getElementById('health-text').textContent='接続エラー';
                }
            }
            setInterval(pollHealth,3000);
            pollHealth();
            window.addEventListener('online',()=>location.reload());
        })();
        (function(){
            async function measurePing(){
                try{
                    const t0=performance.now();
                    await fetch('/api/ping');
                    const rtt=(performance.now()-t0).toFixed(2);
                    document.getElementById('ping-text').textContent='server: '+rtt+'ms';
                }catch(e){
                    document.getElementById('ping-text').textContent='server: --';
                }
            }
            setInterval(measurePing,3000);
            measurePing();
        })();
    </script>
</body>
</html>
